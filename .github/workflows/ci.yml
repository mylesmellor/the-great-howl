name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # JSX project, no tsconfig — lint + build are the env-free checks here
      # (adapted from operator/templates/github-actions/ci.yml, which assumes typecheck).
      - run: npm run lint
      - run: npm run build
